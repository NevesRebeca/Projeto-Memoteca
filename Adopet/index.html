<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adopet</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body>
  <header>
    <div class="conteudo-cabecalho">
      <div class="logo">
        <img src="assets/imagens/logo.png" alt="">
        <h1>Seu novo<br> melhor amigo
          <br> <strong>espera
            <br> por você!</strong>
        </h1>
      </div>
      <div class="imagem-cabecalho">
        <img src="assets/imagens/computador-cabecalho.png" alt="">
      </div>
    </div>
  </header>
  <main class="background-overlay">
    <div class="overlay"></div>
    <div class="overlay overlay-color"></div>
    <h2>Cadastre um Pet</h2>
    <section id="lista-pets-container">
      <form id="pets-form">
        <input type="hidden" id="pet-id" />
        <label for="pet-nome">Nome</label>
        <input type="text" id="pet-nome" placeholder="Digite o nome do pet" required>
        <label for="pet-raca">
          Raça
        </label>
        <input type="text" id="pet-raca" placeholder="Digite a raça do pet" required />
        <label for="pet-especie">
          Espécie
        </label>
        <input type="text" id="pet-especie" placeholder="Digite a espécie do pet" required />
        <div class="form-botoes">
          <button type="submit" id="botao-salvar">
            Adicionar
          </button>
          <button type="button" id="botao-cancelar">
            Cancelar
          </button>
        </div>
      </form>
    </section>
    <span></span>
    <section id="lista-pets-container">
      <h3>Conheça nossos amigos:</h3>
      <div id="mensagem-vazia" class="mensagem-vazia">
        <img src="assets/imagens/lista-vazia.png" alt="Nenhum pensamento disponível">
        <p>Nada por aqui ainda, que tal compartilhar alguma ideia?</p>
      </div>
      <ul id="lista-pets"></ul>
    </section>
  </main>
  <footer>
    <p>&copy;
      2026 Desenvolvido por Chewbecca.
      Projeto fictício sem fins comerciais.</p>
  </footer>
  <script type="module" src="js/api.js"></script>
  <script type="module" src="js/ui.js"></script>
  <script type="module" src="js/main.js"></script>
</body>

</html>
